# LLM Provider Configuration for MarketRadar
# Supports multiple providers with per-module overrides
# Environment variables: use ${VAR_NAME} syntax
#
# 换机器时：更新 default_provider 即可切换全局 LLM
# 详细说明见 docs/LLM_Config.md

default_provider: gongfeng

providers:
  # ── 工蜂AI（腾讯内网推荐，无需 API Key）──────────────────
  gongfeng:
    base_url: "https://copilot.code.woa.com/server/openclaw/copilot-gateway/v1"
    auth_type: gongfeng_oauth          # 特殊认证：自动读取本地 OpenClaw OAuth token
    auth_profile_path: "~/.openclaw/agents/main/agent/auth-profiles.json"
    model: "claude-sonnet-4-6"
    timeout: 60
    max_retries: 4
    rate_limit_backoff_seconds: 8
    # 腾讯内网机器推荐。认证方式：读取本地 OpenClaw OAuth token，无需手动配置。
    # Windows 路径: %USERPROFILE%\.openclaw\agents\main\agent\auth-profiles.json
    # 如果限流/不可用，自动尝试下面 fallback_providers
    fallback_providers: [xfyun, deepseek, claude, openai]

  # ── DeepSeek（通用备用，需要 API Key）────────────────────
  deepseek:
    base_url: "https://api.deepseek.com/v1"
    api_key: "${DEEPSEEK_API_KEY}"
    model: "deepseek-chat"
    timeout: 60
    max_retries: 3
    # 通用备用方案。设置环境变量 DEEPSEEK_API_KEY 即可使用。

  xfyun:
    base_url: "https://maas-coding-api.cn-huabei-1.xf-yun.com/v2"
    api_key: "${XFYUN_API_KEY}"
    model: "astron-code-latest"
    timeout: 60
    max_retries: 3
    # 讯飞星辰 Coding Plan，OpenAI-compatible API

  claude:
    base_url: "https://api.anthropic.com/v1"
    api_key: "${ANTHROPIC_API_KEY}"
    model: "claude-3-5-sonnet-20241022"
    timeout: 90
    max_retries: 2
    # Claude for complex judgment tasks requiring nuanced reasoning

  openai:
    base_url: "${OPENAI_BASE_URL}"
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4o"
    timeout: 60
    max_retries: 3
    # OpenAI as fallback or for specific tasks

# Per-module configuration overrides
# provider 留空 = 使用 default_provider
# 如需针对某模块切换 provider，取注 provider 行即可
module_overrides:
  m1_decoder:
    temperature: 0.1
    # 低 temperature: M1 必须客观提取事实
    # 切换 provider 示例: provider: deepseek

  m3_judgment:
    temperature: 0.2

  m4_action:
    temperature: 0.2

  m6_retrospective:
    temperature: 0.1
